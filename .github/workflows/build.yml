name: Cloud Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Build qbitRT Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: npm ci

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      # Build debug APK by default so no signing keystore is required.
      # To build a signed release APK, create a signing keystore and add
      # KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, and KEY_PASSWORD
      # as repository secrets, then replace the command below with:
      #   ./gradlew assembleRelease
      - name: Build qbitRT Android APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Rename APK to qbitRT
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/debug/app-debug.apk artifacts/qbitRT.apk

      - name: Upload qbitRT APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: qbitRT
          path: artifacts/qbitRT.apk
          if-no-files-found: error

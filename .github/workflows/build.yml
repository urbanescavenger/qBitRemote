name: Cloud Build

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Build qbitRT Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: npm ci

      # Native projects (android/) are gitignored — regenerate from app.json +
      # config plugins on every run via expo prebuild.
      - name: Generate native Android project
        run: npx expo prebuild --platform android --clean

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      # Restore the release keystore from repo secrets (tag builds only).
      # Requires secrets: KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD.
      - name: Restore release keystore
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          echo "${KEYSTORE_BASE64}" | base64 -d > "$RUNNER_TEMP/release.keystore"
          ls -l "$RUNNER_TEMP/release.keystore"
          echo "KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"
          echo "KEY_ALIAS=${KEY_ALIAS}" >> "$GITHUB_ENV"
          echo "KEYSTORE_PASSWORD=${KEYSTORE_PASSWORD}" >> "$GITHUB_ENV"
          echo "KEY_PASSWORD=${KEY_PASSWORD}" >> "$GITHUB_ENV"

      # Branch / PR builds: debug APK (no keystore needed).
      - name: Build debug APK
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Collect debug APK
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/debug/app-debug.apk artifacts/qbitRT-debug.apk

      # Tag builds: signed universal release APK.
      - name: Build signed release APK
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: android
        run: |
          ./gradlew assembleRelease \
            -Pkey.store="$KEYSTORE_PATH" \
            -Pkey.alias="$KEY_ALIAS" \
            -Pkey.store.password="$KEYSTORE_PASSWORD" \
            -Pkey.key.password="$KEY_PASSWORD"

      - name: Collect release APK
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/release/app-release.apk "artifacts/qbitRT-${{ github.ref_name }}.apk"
          ls -l artifacts

      - name: Upload qbitRT APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: qbitRT
          path: artifacts/*.apk
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" artifacts/*.apk \
            --generate-notes \
            --title "${{ github.ref_name }}"
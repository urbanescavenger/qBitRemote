name: Android CI

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.4

      # Generate Gradle wrapper if missing (first run on new project)
      - name: Ensure Gradle wrapper
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.4
          fi
          chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Branch / PR builds: debug APK.
      - name: Build debug APK
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: ./gradlew :app:assembleDebug

      - name: Run unit tests
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: ./gradlew :app:testDebugUnitTest

      - name: Collect debug APK
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/app-debug.apk artifacts/qBitRemote-debug.apk

      # Tag builds: signed universal release APK.
      # Requires secrets: KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD.
      - name: Restore release keystore
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          echo "${KEYSTORE_BASE64}" | base64 -d > "$RUNNER_TEMP/release.keystore"
          ls -l "$RUNNER_TEMP/release.keystore"

      - name: Build signed release APK
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew :app:assembleRelease \
            -Pkey.store="$KEYSTORE_PATH" \
            -Pkey.alias="$KEY_ALIAS" \
            -Pkey.store.password="$KEYSTORE_PASSWORD" \
            -Pkey.key.password="$KEY_PASSWORD"

      - name: Collect release APK
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/release/app-release.apk "artifacts/qBitRemote-${{ github.ref_name }}.apk"
          ls -l artifacts

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: qBitRemote-APK
          path: artifacts/*.apk
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" artifacts/*.apk \
            --generate-notes \
            --title "${{ github.ref_name }}"
